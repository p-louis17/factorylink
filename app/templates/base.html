<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FactoryLink {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/">
      <span class="brand-icon">⬡</span>
      FactoryLink
    </a>
    <div class="nav-links">
      {% if user %}
        <span class="nav-user">{{ user.name }} · <span class="nav-role">{{ user.role.value }}</span></span>
        <a href="/auth/logout" class="btn btn-outline">Logout</a>
      {% else %}
        <a href="/" class="btn btn-outline">Login</a>
        <a href="/#register" class="btn btn-primary">Register</a>
      {% endif %}
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="footer-inner">
      <span class="brand">⬡ FactoryLink</span>
      <span>Connecting African Suppliers &amp; Manufacturers</span>
    </div>
  </footer>
</body>
</html>
